name: Build

on:
    workflow_dispatch:
        inputs:
            img_tag:
                description: Docker Image Tag
            ref:
                description: Revision or Branch to build
                default: main
            push_latest:
                description: Set True if the build is for the latest version
                type: boolean
                required: false
                default: false
            platforms:
                description: Platforms to build for
                type: choice
                default: linux/amd64
                options:
                - linux/amd64,linux/arm64
                - linux/amd64
                - linux/arm64
            rebuild:
                description: Rebuild this image?
                type: boolean
                default: false

jobs:
    build-image:
        permissions:
            contents: read
            packages: write
        name: Build Image
        uses: hathitrust/github_actions/.github/workflows/build.yml@98a7b0f67c16b968bb1f357ac50224dbfa789f3f # v2.0.2
        with:
            image: ghcr.io/${{ github.repository }}
            dockerfile: Dockerfile
            img_tag: ${{ inputs.img_tag }}
            tag: ${{ inputs.ref }}
            push_latest: ${{ inputs.push_latest}}
            rebuild: ${{ inputs.rebuild }}
            build-args: 'version="commit ${{ github.sha }}"'
            platforms: ${{ inputs.platforms }}
        secrets: inherit
