name: Tag Latest Image with Release Version

on:
  release:
    types: [released]

jobs:
  tag-release:
    name: Tag Release
    uses: hathitrust/github_actions/.github/workflows/tag-release.yml@2936af20240b3438cd0694fdd0e598b52ced1324 # v2.0.1
    with:
      existing_tag: ghcr.io/${{ github.repository }}:${{ github.sha }}
      image: ghcr.io/${{ github.repository }}
      new_tag: ${{ github.event.release.tag_name }}
    secrets: inherit

